server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Bật Gzip để giảm kích thước response
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Cache lâu dài cho static assets (JS/CSS đã được content-hash bởi Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # QUAN TRỌNG cho React Router:
    # Mọi request đều trả về index.html → React Router tự xử lý routing
    # Nếu thiếu dòng này: F5 tại /wishlist sẽ báo 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
